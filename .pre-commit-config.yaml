default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-json
        exclude: ^\.vscode/
    -   id: check-merge-conflict
    -   id: check-symlinks
    # Generic YAML validation for all YAML files except GitLab CI.
    # GitLab CI supports custom YAML tags such as !reference, which generic
    # YAML loaders used do not understand in strict mode.
    -   id: check-yaml
        name: check-yaml-strict
        exclude: ^\.gitlab-ci\.yml$
    # GitLab CI YAML validation.
    # --unsafe checks syntax without constructing the YAML object model,
    # allowing GitLab-specific tags such as !reference.
    -   id: check-yaml
        name: check-gitlab-ci-yaml
        files: ^\.gitlab-ci\.yml$
        args: [--unsafe]
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: trailing-whitespace
  - repo: git-adacore:eng/spark/support
    rev: "v1.1.0"
    hooks:
    -   id: check-submodules
    -   id: check-empty-testoutopt
    -   id: check-testsuite-markers
    -   id: check-doc-src-refs
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
    - id: flake8
      additional_dependencies:
        - flake8-bugbear
  - repo: https://github.com/ambv/black
    rev: 25.1.0
    hooks:
    - id: black
  - repo: local
    hooks:
      # The Issue-trailer check is deliberately not registered as a git hook
      # here so that it does not block local commits. It is enforced in CI
      # only, where scripts/check_issue_trailer.py is invoked directly against
      # each commit message.
      - id: check-opt-syntax
        name: Check opt file syntax
        files: '\.opt$'
        language: system
        entry: e3-opt-check
  - repo: local
    hooks:
      - id: check-gnatformat-gnatprove
        name: Check for Ada formatting in gnatprove project
        files: ^src/(gnatprove|common)/.*\.ad(b|s)$
        language: system
        entry: gnatformat -P gnatprove --no-subprojects
      - id: check-gnatformat-gnat2why
        name: Check for Ada formatting in gnat2why project
        files: ^src/(counterexamples|flow|spark|utils|why)/.*\.ad(b|s)$
        exclude: ^src/why/xgen/.*
        language: system
        entry: gnatformat -P gnat2why/gnat2why --no-subprojects
